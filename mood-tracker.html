<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mood tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  /* page-specific styles that don't belong in the shared theme.css
     because only this page uses them */
  .mood-picker{
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .mood-btn{
    font-size: 26px;
    background: var(--surface-2);
    border: 2px solid transparent;
    border-radius: 10px;
    width: 52px;
    height: 52px;
    cursor: pointer;
  }
  .mood-btn.selected{
    border-color: var(--accent);
  }
</style>
</head>
<body>
<div class="container">

  <div class="top-nav">
    <a href="index.html" data-internal>← home</a>
  </div>

  <div id="themeSwitch"></div>

  <h1>mood tracker</h1>
  <p class="lede">how are you doing right now?</p>

  <!-- .board gives the same dotted corkboard background used on the
       homepage, so this page still feels like part of the same site
       rather than a plain separate form -->
  <div class="board">

    <!-- .panel.pinned.tilt-c: the ordinary .panel look from
         theme.css, PLUS the washi-tape strip and a slight rotation
         from the shared corkboard classes -->
    <div class="panel pinned tilt-c">
      <!-- ============================================================
           MOOD PICKER
           Built from the MOODS array below rather than hard-coded
           buttons, so adding a new mood later = one more array entry.
           Clicking a button stores its value in `selectedMood` and
           gives it the "selected" outline via the .selected class.
           ============================================================ -->
      <div class="mood-picker" id="moodPicker"></div>

      <textarea id="moodNote" rows="3" placeholder="add a quick note (optional)..."></textarea>
      <br><br>
      <button class="btn" id="logMoodBtn">log this mood</button>
    </div>

    <p class="lede" style="margin: 26px 0 12px;">today's log</p>
    <!-- each logged mood is rendered as its own small pinned
         .note-card (see renderEntries() below) rather than one long
         plain list, so the log reads like a little stack of notes -->
    <div id="moodEntries"></div>
  </div>

</div>

<script src="theme.js"></script>
<script>
/* ================================================================
   DATA + STATE
   ----------------------------------------------------------------
   MOODS: the list of emoji + label pairs shown as buttons.
   entries: every mood logged THIS SESSION. It's a plain in-memory
   array, not saved to a file or database -- refreshing the page
   clears it. That's a deliberate limitation of running purely
   inside the browser with no backend (see note further down about
   why we don't use localStorage here either).
   ================================================================ */
  const MOODS = [
    { emoji: '😊', label: 'good' },
    { emoji: '😌', label: 'calm' },
    { emoji: '😐', label: 'okay' },
    { emoji: '😔', label: 'low' },
    { emoji: '😣', label: 'stressed' },
    { emoji: '😴', label: 'tired' }
  ];

  let selectedMood = null;
  let entries = [];

/* ================================================================
   RENDER: MOOD PICKER
   Draws one button per entry in MOODS. Clicking a button just sets
   selectedMood and re-runs this function so the "selected" ring
   moves to the newly clicked one.
   ================================================================ */
  function renderMoodPicker(){
    const el = document.getElementById('moodPicker');
    el.innerHTML = '';
    MOODS.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'mood-btn' + (selectedMood === m.label ? ' selected' : '');
      btn.textContent = m.emoji;
      btn.title = m.label;
      btn.onclick = () => {
        selectedMood = m.label;
        renderMoodPicker();
      };
      el.appendChild(btn);
    });
  }

/* ================================================================
   LOGGING AN ENTRY
   Reads the currently selected mood + whatever's in the textarea,
   pushes a new entry object (with a timestamp) onto `entries`, then
   clears the form and re-renders the log below.
   ================================================================ */
  document.getElementById('logMoodBtn').onclick = () => {
    if (!selectedMood){
      alert('pick a mood first!');
      return;
    }
    const noteEl = document.getElementById('moodNote');
    entries.unshift({
      mood: selectedMood,
      emoji: MOODS.find(m => m.label === selectedMood).emoji,
      note: noteEl.value.trim(),
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    });

    // reset the form for the next entry
    selectedMood = null;
    noteEl.value = '';
    renderMoodPicker();
    renderEntries();
  };

/* ================================================================
   RENDER: ENTRY LIST
   Shows every logged mood, newest first (we used unshift() above
   so index 0 is always the latest).
   ================================================================ */
  function renderEntries(){
    const el = document.getElementById('moodEntries');
    if (entries.length === 0){
      el.innerHTML = `<p class="empty-note">nothing logged yet today</p>`;
      return;
    }
    // alternate tilt-a / tilt-b per row (using the loop index, i) so
    // consecutive notes lean in different directions instead of all
    // tilting the same way
    el.innerHTML = entries.map((e, i) => `
      <div class="note-card pinned ${i % 2 === 0 ? 'tilt-a' : 'tilt-b'}">
        <p class="entry-meta">${e.time}</p>
        <p class="entry-text">${e.emoji} ${e.mood}${e.note ? ' — ' + e.note : ''}</p>
      </div>
    `).join('');
  }

  renderMoodPicker();
  renderEntries();
</script>
</body>
</html>
