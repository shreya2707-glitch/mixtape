<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal Vault</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="studio-layout">
    <aside class="left-deck-panel" id="deckPanel">
      <div>
        <h3>Vault Deck</h3>
        <p class="subtext">Click tape deck structure to advance tracks manually.</p>
        <div class="cassette-shell">
          <div class="cassette-label" id="currentTrackLabel">SIDE A: MIDNIGHT DRIFT</div>
          <div class="reels-container">
            <svg class="reel" width="65" height="65" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent-amber)" stroke-width="5"/><circle cx="50" cy="50" r="18" fill="none" stroke="var(--accent-amber)" stroke-width="3" stroke-dasharray="12 6"/></svg>
            <svg class="reel" width="65" height="65" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent-amber)" stroke-width="5"/><circle cx="50" cy="50" r="18" fill="none" stroke="var(--accent-amber)" stroke-width="3" stroke-dasharray="12 6"/></svg>
          </div>
        </div>
        <div class="now-playing-banner"><div class="pulse-dot"></div><span>Session Audio Grid Sync</span></div>
      </div>
      <button class="btn-action" id="globalPlayBtn" style="width: 100%;">Engage Master Drive</button>
    </aside>

    <main class="right-canvas-panel">
      <nav class="studio-nav">
        <a href="index.html" class="nav-btn">Hub</a>
        <a href="mixtape-builder.html" class="nav-btn">Mixtape</a>
        <a href="mood-tracker.html" class="nav-btn">Moods</a>
        <a href="constellation.html" class="nav-btn">Constellations</a>
        <a href="journal.html" class="nav-btn active">Journal</a>
        <a href="pomodoro.html" class="nav-btn">Pomodoro</a>
        <a href="release.html" class="nav-btn">Release</a>
        <a href="time-capsule.html" class="nav-btn">Capsule</a>
      </nav>
      <div class="canvas-content">
        <h2>Midnight Ledger Database</h2>
        <p class="subtext">Log deep stream-of-consciousness observations down into dark cache frameworks.</p>
        <div class="card">
          <textarea id="journalArea" class="input-field" rows="10" placeholder="Begin transaction entry log details here..."></textarea>
          <button class="btn-action" id="saveLogBtn">Commit Log to History</button>
          <div id="statusReport" style="margin-top:1.5rem; font-size:0.85rem; font-family:monospace; color:var(--text-muted);"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="studio.js"></script>
  <script>
    document.getElementById("saveLogBtn").addEventListener("click", () => {
      const area = document.getElementById("journalArea");
      if(area.value.trim() !== "") {
        document.getElementById("statusReport").innerText = `>> Static log block sequence compiled successfully at timestamp cluster reference.`;
        area.value = "";
      }
    });
  </script>
</body>
</html>
