<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Capsule</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="studio-layout">
    <aside class="left-deck-panel" id="deckPanel">
      <div>
        <h3>Vault Deck</h3>
        <p class="subtext">Click tape deck structure to advance tracks manually.</p>
        <div class="cassette-shell">
          <div class="cassette-label" id="currentTrackLabel">SIDE A: MIDNIGHT DRIFT</div>
          <div class="reels-container">
            <svg class="reel" width="65" height="65" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent-amber)" stroke-width="5"/><circle cx="50" cy="50" r="18" fill="none" stroke="var(--accent-amber)" stroke-width="3" stroke-dasharray="12 6"/></svg>
            <svg class="reel" width="65" height="65" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent-amber)" stroke-width="5"/><circle cx="50" cy="50" r="18" fill="none" stroke="var(--accent-amber)" stroke-width="3" stroke-dasharray="12 6"/></svg>
          </div>
        </div>
        <div class="now-playing-banner"><div class="pulse-dot"></div><span>Session Audio Grid Sync</span></div>
      </div>
      <button class="btn-action" id="globalPlayBtn" style="width: 100%;">Engage Master Drive</button>
    </aside>

    <main class="right-canvas-panel">
      <nav class="studio-nav">
        <a href="index.html" class="nav-btn">Hub</a>
        <a href="mixtape-builder.html" class="nav-btn">Mixtape</a>
        <a href="mood-tracker.html" class="nav-btn">Moods</a>
        <a href="constellation.html" class="nav-btn">Constellations</a>
        <a href="journal.html" class="nav-btn">Journal</a>
        <a href="pomodoro.html" class="nav-btn">Pomodoro</a>
        <a href="release.html" class="nav-btn">Release</a>
        <a href="time-capsule.html" class="nav-btn active">Capsule</a>
      </nav>
      <div class="canvas-content">
        <h2>Temporal Memory Crypt</h2>
        <p class="subtext">Seal active configuration metrics away into deep time array slots.</p>
        <div class="card">
          <label style="display:block; margin-bottom:0.5rem; color:var(--text-muted); font-size:0.8rem; text-transform:uppercase;">Select Lock Coordinates</label>
          <input type="date" id="capsuleDate" class="input-field">
          <button class="btn-action" id="vaultBtn">Bury State Matrix</button>
          <p id="vaultFeedback" style="margin-top:1.5rem; font-family:monospace; color:var(--accent-amber); font-size:0.85rem;"></p>
        </div>
      </div>
    </main>
  </div>
  <script src="studio.js"></script>
  <script>
    document.getElementById("vaultBtn").addEventListener("click", () => {
      const targetDate = document.getElementById("capsuleDate").value;
      if (targetDate) {
        document.getElementById("vaultFeedback").innerText = `>> Workspace array elements buried until chronological breakthrough reference: ${targetDate}`;
      } else {
        alert("Select dynamic lock vector calendar parameters.");
      }
    });
  </script>
</body>
</html>
